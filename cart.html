<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Корзина — Капсула</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cache-limeshop.cdnvideo.ru" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" /></noscript>
  <link rel="stylesheet" href="css/style.css?v=4" />
</head>
<body>
  <div id="site-header-root"></div>

  <main class="cart-page">
    <h1 class="section__title" style="padding: 0 20px; max-width: var(--max); margin: 0 auto 24px">Корзина</h1>
    <p class="form__ok preorder-success" id="preorder-success" hidden></p>
    <div class="cart-layout site-wrap">
      <div>
        <div class="cart-lines" id="cart-lines"></div>
        <p class="catalog-empty" id="cart-empty">Корзина пуста. <a href="catalog.html">Перейти в каталог</a></p>
      </div>
      <aside class="cart-aside" id="cart-aside" hidden>
        <p class="cart-aside__total">Итого: <strong id="cart-sum">0 ₽</strong></p>
        <h2 class="section__title" style="font-size: 1rem; margin-bottom: 12px">Предзаказ</h2>
        <form id="preorder-form" class="form">
          <div class="form__row">
            <label for="pf-name">Имя *</label>
            <input id="pf-name" name="name" required autocomplete="name" />
          </div>
          <div class="form__row">
            <label for="pf-phone">Телефон *</label>
            <input id="pf-phone" name="phone" required inputmode="tel" autocomplete="tel" />
          </div>
          <div class="form__row">
            <label for="pf-email">E-mail *</label>
            <input id="pf-email" name="email" type="email" required autocomplete="email" />
          </div>
          <div class="form__row">
            <label for="pf-city">Город</label>
            <input id="pf-city" name="city" autocomplete="address-level2" />
          </div>
          <fieldset class="form__row payment-methods">
            <legend class="payment-methods__legend">Способ оплаты *</legend>
            <label class="payment-methods__option">
              <input type="radio" name="paymentMethod" value="cash" required />
              <span class="payment-methods__text">
                <strong>Наличные</strong>
                <small>При получении заказа или в шоуруме</small>
              </span>
            </label>
            <label class="payment-methods__option">
              <input type="radio" name="paymentMethod" value="transfer" required />
              <span class="payment-methods__text">
                <strong>Перевод / СБП</strong>
                <small>Реквизиты пришлём после подтверждения заказа</small>
              </span>
            </label>
            <label class="payment-methods__option">
              <input type="radio" name="paymentMethod" value="showroom" required />
              <span class="payment-methods__text">
                <strong>В шоуруме</strong>
                <small>Оплата при примерке и выдаче</small>
              </span>
            </label>
          </fieldset>
          <fieldset class="form__row delivery-methods">
            <legend class="delivery-methods__legend">Способ доставки *</legend>
            <label class="delivery-methods__option">
              <input type="radio" name="deliveryMethod" value="pickup" required />
              <span class="delivery-methods__text">
                <strong>Самовывоз</strong>
                <small>Забрать заказ в шоуруме Капсулы</small>
              </span>
            </label>
            <label class="delivery-methods__option">
              <input type="radio" name="deliveryMethod" value="courier" required />
              <span class="delivery-methods__text">
                <strong>Курьер</strong>
                <small>Доставка по городу — адрес уточним по телефону</small>
              </span>
            </label>
            <label class="delivery-methods__option">
              <input type="radio" name="deliveryMethod" value="pvz" required />
              <span class="delivery-methods__text">
                <strong>Пункт выдачи</strong>
                <small>СДЭК, Boxberry и другие ПВЗ</small>
              </span>
            </label>
            <label class="delivery-methods__option">
              <input type="radio" name="deliveryMethod" value="postal" required />
              <span class="delivery-methods__text">
                <strong>Почта России</strong>
                <small>Доставка в отделение по индексу</small>
              </span>
            </label>
          </fieldset>
          <div class="form__row">
            <label for="pf-comment">Комментарий</label>
            <textarea id="pf-comment" name="comment" rows="3"></textarea>
          </div>
          <div class="form__row form__row--check">
            <input type="checkbox" id="pf-consent" name="consent" required />
            <label for="pf-consent">Согласие на обработку персональных данных *</label>
          </div>
          <button type="submit" class="btn btn--primary btn--block">Отправить предзаказ</button>
        </form>
      </aside>
    </div>
  </main>

  <div id="site-footer-root"></div>

  <script defer src="js/volna-api.js?v=2"></script>
  <script defer src="js/catalog-sections.js?v=2"></script>
  <script defer src="js/products.js?v=2"></script>
  <script defer src="js/cart-core.js?v=3"></script>
  <script defer src="js/site-chrome.js?v=2"></script>
  <script defer src="js/auth-pages.js?v=2"></script>
  <script defer src="js/cart-page.js?v=4"></script>
  <script defer src="js/motion.js?v=2"></script>
</body>
</html>
