<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Админ — Капсула</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cache-limeshop.cdnvideo.ru" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" /></noscript>
  <link rel="stylesheet" href="css/style.css?v=2" />
</head>
<body class="page-admin">
  <div id="site-header-root"></div>

  <main class="admin-page">
    <h1 class="section__title site-wrap" style="padding: 0 20px">Админ-панель</h1>
    <p class="section__sub site-wrap" style="padding: 0 20px; margin-bottom: 24px" id="admin-gate">Загрузка…</p>
    <div class="admin-grid site-wrap" id="admin-content" hidden>
      <div class="admin-card admin-card--span">
        <h2 class="section__title" style="font-size: 1rem">Каталог товаров</h2>
        <p class="form__err" id="admin-products-err" hidden></p>
        <p class="admin-inline-ok" id="admin-products-ok" hidden></p>
        <div class="admin-products-toolbar">
          <button type="button" class="btn btn--primary btn--sm" id="admin-products-save">Сохранить каталог</button>
          <button type="button" class="btn btn--ghost btn--sm" id="admin-products-add">Добавить товар</button>
        </div>
        <div class="admin-table-scroll">
          <table class="admin-table" id="admin-products-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Цена</th>
                <th>Пол</th>
                <th>Категория</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <div class="admin-card">
        <h2 class="section__title" style="font-size: 1rem">Почта (уведомления)</h2>
        <p class="section__sub" id="admin-mail-status">Проверка…</p>
        <button type="button" class="btn btn--ghost btn--sm" id="admin-mail-test" hidden>Отправить тестовое письмо</button>
        <p class="form__err" id="admin-mail-err" hidden></p>
        <p class="admin-inline-ok" id="admin-mail-ok" hidden></p>
      </div>
      <div class="admin-card">
        <h2 class="section__title" style="font-size: 1rem">Пользователи</h2>
        <table class="admin-table" id="admin-users-table">
          <thead><tr><th>ID</th><th>E-mail</th><th>Имя</th><th>Роль</th></tr></thead>
          <tbody></tbody>
        </table>
        <p class="form__err" id="admin-users-err" hidden></p>
      </div>
      <div class="admin-card">
        <h2 class="section__title" style="font-size: 1rem">Предзаказы</h2>
        <table class="admin-table" id="admin-preorders-table">
          <thead><tr><th>ID</th><th>Клиент</th><th>Телефон</th><th>Статус</th><th>Сумма</th><th>Дата</th><th></th></tr></thead>
          <tbody></tbody>
        </table>
        <p class="form__err" id="admin-preorders-err" hidden></p>
        <pre class="admin-json" id="admin-preorder-detail" hidden></pre>
      </div>
    </div>
  </main>

  <div id="site-footer-root"></div>

  <script defer src="js/volna-api.js?v=2"></script>
  <script defer src="js/catalog-sections.js?v=2"></script>
  <script defer src="js/products.js?v=2"></script>
  <script defer src="js/cart-core.js?v=2"></script>
  <script defer src="js/site-chrome.js?v=2"></script>
  <script defer src="js/auth-pages.js?v=2"></script>
  <script defer src="js/admin-page.js?v=4"></script>
</body>
</html>
